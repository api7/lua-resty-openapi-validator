name: Release

on:
  push:
    branches:
      - "main"
    paths:
      - 'rockspec/**'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1.5"

      - name: Install Luarocks
        uses: leafo/gh-actions-luarocks@v4
        with:
          luarocksVersion: "3.11.1"

      - name: Extract release name
        id: release_env
        shell: bash
        run: |
          title="${{ github.event.head_commit.message }}"
          re="^feat: release v*(\S+)"
          if [[ $title =~ $re ]]; then
              v=v${BASH_REMATCH[1]}
              echo "version=${v}" >> $GITHUB_OUTPUT
              echo "version_without_v=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
              echo "commit format is not correct"
              exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_env.outputs.version }}
          name: ${{ steps.release_env.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload to luarocks
        env:
          LUAROCKS_TOKEN: ${{ secrets.LUAROCKS_TOKEN }}
        run: |
          luarocks install dkjson
          luarocks upload rockspec/lua-resty-openapi-validator-${{ steps.release_env.outputs.version_without_v }}-1.rockspec --api-key=${LUAROCKS_TOKEN}
